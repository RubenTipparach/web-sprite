name: Deploy to GitHub Pages

on:
  push:
    branches: ['**']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine base path
        id: basepath
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
            echo "base=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
            echo "subdir=." >> "$GITHUB_OUTPUT"
          else
            SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')
            echo "base=/${REPO_NAME}/branches/${SAFE_BRANCH}/" >> "$GITHUB_OUTPUT"
            echo "subdir=branches/${SAFE_BRANCH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npx vite build
        env:
          VITE_BASE_PATH: ${{ steps.basepath.outputs.base }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
